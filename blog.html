<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — David Kwame Amo</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="DKA">
    <link rel="apple-touch-icon" href="/icons/icon.svg">

    <!-- SEO -->
    <meta name="description" content="Notes from the build — on design, tools, culture, and the work behind the work. By David Kwame Amo.">
    <meta property="og:title" content="Blog — David Kwame Amo">
    <meta property="og:description" content="Notes from the build — on design, tools, culture, and the work behind the work.">
    <meta property="og:type" content="website">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=Syne:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/blog.css">
</head>
<body>

<header class="site-nav" id="site-nav">
    <div class="nav-inner">
        <a href="index.html" class="nav-back">← back</a>
        <span class="nav-center">Blog</span>
        <span class="nav-right" id="nav-right-count"></span>
    </div>
</header>

<section class="blog-hero">
    <div class="hero-inner">
        <p class="hero-eyebrow">Writing & Thinking</p>
        <h1 class="hero-title">Notes from the build.</h1>
        <p class="hero-sub">on design, tools, culture, and the work behind the work.</p>
    </div>
</section>

<div class="posts-bar">
    <div class="posts-count-row">
        <span class="posts-count-lbl" id="posts-count">loading posts...</span>
    </div>
</div>

<section class="blog-section">
    <div class="blog-grid" id="blog-grid"></div>
</section>

<div class="blog-modal" id="blog-modal">
    <div class="modal-nav">
        <button type="button" class="modal-close" onclick="closePost()">✕ close</button>
        <span class="modal-nav-counter" id="modal-counter"></span>
        <div class="modal-nav-btns">
            <button type="button" class="modal-nav-btn" id="prev-btn" onclick="navigatePost(-1)">← prev</button>
            <button type="button" class="modal-nav-btn" id="next-btn" onclick="navigatePost(1)">next →</button>
        </div>
    </div>
    <div class="modal-content">
        <p class="modal-eyebrow" id="modal-eyebrow"></p>
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-date" id="modal-date"></div>
        <div class="modal-body" id="modal-body"></div>
    </div>
    <div class="modal-footer">
        <button type="button" class="mf-btn" id="prev-btn-foot" onclick="navigatePost(-1)">← previous</button>
        <span class="mf-counter" id="mf-counter"></span>
        <button type="button" class="mf-btn" id="next-btn-foot" onclick="navigatePost(1)">next →</button>
    </div>
</div>

<script defer src="/js/blog.js"></script>
</body>
</html>
