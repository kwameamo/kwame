<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — David Kwame Amo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=Syne:wght@400;600;800&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f0f0f;
            --paper: #f8f7f4;
            --mid: #9e9e9e;
            --line: #e2e0db;
            --hover-bg: #f0eeea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Syne Mono', monospace;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: 0.6;
        }

        /* ══════════════════════════════
           HEADER
        ══════════════════════════════ */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--paper);
            border-bottom: 1px solid var(--line);
            padding: 0 2rem;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Subtle backdrop blur on header scroll */
        .site-header::after {
            content: '';
            position: absolute;
            inset: 0;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .site-header.scrolled::after {
            opacity: 1;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .back-link {
            text-decoration: none;
            color: var(--mid);
            font-size: 11px;
            letter-spacing: 0.06em;
            text-transform: lowercase;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .back-link:hover {
            color: var(--ink);
        }

        .header-divider {
            width: 1px;
            height: 16px;
            background: var(--line);
        }

        .header-name {
            font-size: 12px;
            color: var(--mid);
            letter-spacing: 0.04em;
            text-decoration: none;
        }



        .header-blog-label {
            font-family: 'Fraunces', Georgia, serif;
            font-weight: 300;
            font-size: 14px;
            letter-spacing: 0.04em;
            text-transform: lowercase;
            color: var(--ink);
        }

        .header-right {
            font-size: 11px;
            color: var(--mid);
            letter-spacing: 0.06em;
            text-transform: lowercase;
            min-width: 80px;
            text-align: right;
        }

        /* ══════════════════════════════
           HERO SECTION
        ══════════════════════════════ */
        .blog-hero {
            padding: 4rem 2rem 3rem;
            max-width: 840px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.1s forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .blog-hero-eyebrow {
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--mid);
            margin-bottom: 0.75rem;
        }

        .blog-hero-title {
            font-family: 'Fraunces', Georgia, serif;
            font-weight: 300;
            font-size: clamp(2rem, 6vw, 3.5rem);
            line-height: 1.1;
            letter-spacing: -0.01em;
            color: var(--ink);
            margin-bottom: 1rem;
        }

        .blog-hero-sub {
            font-size: 12px;
            color: var(--mid);
            letter-spacing: 0.04em;
        }

        /* ══════════════════════════════
           GRID
        ══════════════════════════════ */
        .blog-section {
            max-width: 840px;
            margin: 0 auto;
            padding: 0 2rem 6rem;
        }

        .posts-count {
            font-size: 10px;
            color: var(--mid);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--line);
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1px;
            background: var(--line);
            border: 1px solid var(--line);
            opacity: 0;
            transform: translateY(8px);
            animation: fadeUp 0.6s ease 0.2s forwards;
        }

        .blog-card {
            background: var(--paper);
            padding: 1.5rem;
            cursor: pointer;
            transition: background 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .blog-card::after {
            content: '→';
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            font-size: 11px;
            color: var(--mid);
            opacity: 0;
            transform: translateX(-4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .blog-card:hover {
            background: var(--hover-bg);
        }

        .blog-card:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        .blog-date {
            font-size: 10px;
            color: var(--mid);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 0.85rem;
        }

        .blog-card-title {
            font-size: 13.5px;
            margin-bottom: 0.6rem;
            font-weight: normal;
            line-height: 1.4;
            letter-spacing: 0.01em;
            padding-right: 1.5rem;
        }

        .blog-excerpt {
            font-size: 11.5px;
            color: var(--mid);
            line-height: 1.55;
        }

        /* ══════════════════════════════
           MODAL / READER
        ══════════════════════════════ */
        .blog-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--paper);
            z-index: 200;
            overflow-y: auto;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .blog-modal.active {
            display: block;
        }

        .blog-modal.visible {
            opacity: 1;
        }

        /* Modal header */
        .modal-header {
            position: sticky;
            top: 0;
            background: var(--paper);
            border-bottom: 1px solid var(--line);
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
        }

        .modal-header::before {
            content: '';
            position: absolute;
            inset: 0;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: -1;
        }

        .close-btn {
            background: none;
            border: 1px solid var(--line);
            padding: 0.45rem 1rem;
            cursor: pointer;
            font-family: 'Syne Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.04em;
            color: var(--ink);
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            border-color: var(--ink);
            background: var(--ink);
            color: var(--paper);
        }

        .modal-nav-label {
            font-size: 10px;
            color: var(--mid);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* Modal content */
        .modal-content {
            max-width: 640px;
            margin: 0 auto;
            padding: 3rem 2rem 5rem;
        }

        .modal-eyebrow {
            font-size: 10px;
            color: var(--mid);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .modal-title {
            font-family: 'Fraunces', Georgia, serif;
            font-weight: 300;
            font-size: clamp(1.5rem, 5vw, 2.25rem);
            line-height: 1.15;
            letter-spacing: -0.01em;
            margin-bottom: 0.5rem;
        }

        .modal-date {
            font-size: 11px;
            color: var(--mid);
            letter-spacing: 0.06em;
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--line);
        }

        .modal-body {
            font-size: 13.5px;
            line-height: 1.85;
            color: #2a2a2a;
        }

        .modal-body p {
            margin-bottom: 1.5rem;
        }

        .modal-body h2 {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 16px;
            margin: 2.5rem 0 1rem;
            letter-spacing: -0.01em;
        }

        .modal-body a {
            color: var(--ink);
            text-decoration: none;
            border-bottom: 1px solid var(--line);
            transition: border-color 0.2s;
        }

        .modal-body a:hover {
            border-bottom-color: var(--ink);
        }

        /* Modal footer nav */
        .modal-footer-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--line);
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
            padding-left: 2rem;
            padding-right: 2rem;
        }

        .nav-btn {
            background: none;
            border: 1px solid var(--line);
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-family: 'Syne Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.04em;
            color: var(--ink);
            transition: all 0.2s ease;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--ink);
            background: var(--ink);
            color: var(--paper);
        }

        .nav-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .nav-counter {
            font-size: 10px;
            color: var(--mid);
            letter-spacing: 0.1em;
        }

        /* ══════════════════════════════
           RESPONSIVE
        ══════════════════════════════ */
        @media (max-width: 768px) {
            .blog-hero { padding: 2.5rem 1.25rem 2rem; }
            .blog-section { padding: 0 1.25rem 4rem; }
            .modal-content { padding: 2rem 1.25rem 4rem; }
            .modal-footer-nav { padding-left: 1.25rem; padding-right: 1.25rem; }
            .site-header { padding: 0 1.25rem; }
            .blog-grid { grid-template-columns: 1fr; }
            .header-right { display: none; }
            .header-divider { display: none; }
            .header-name { display: none; }
        }
    </style>
</head>
<body>

    <!-- ── Site Header ── -->
    <header class="site-header" id="site-header">
        <div class="header-left">
            <a href="index.html" class="back-link">← back</a>
            <div class="header-divider"></div>
            <a href="index.html" class="header-name">David Kwame Amo</a>
        </div>
        <span class="header-blog-label">Blog</span>
    </header>

    <section class="blog-hero">
        <p class="blog-hero-eyebrow">Writing & Thinking</p>
        <h1 class="blog-hero-title">Notes from the build.</h1>
        <p class="blog-hero-sub">on design, tools, culture, and the work behind the work.</p>
    </section>

    <!-- ── Posts ── -->
    <section class="blog-section">
        <div class="posts-count" id="posts-count">loading posts...</div>
        <div class="blog-grid" id="blog-grid"></div>
    </section>

    <!-- ── Post Modal ── -->
    <div class="blog-modal" id="blog-modal">
        <div class="modal-header">
            <button class="close-btn" onclick="closePost()">✕ close</button>
            <span class="modal-nav-label" id="modal-nav-label"></span>
            <div style="display:flex; gap:0.5rem;">
                <button class="nav-btn" id="prev-btn" onclick="navigatePost(-1)">← prev</button>
                <button class="nav-btn" id="next-btn" onclick="navigatePost(1)">next →</button>
            </div>
        </div>

        <div class="modal-content">
            <p class="modal-eyebrow" id="modal-eyebrow">Post</p>
            <h2 class="modal-title" id="modal-title"></h2>
            <div class="modal-date" id="modal-date"></div>
            <div class="modal-body" id="modal-body"></div>
        </div>

        <div class="modal-footer-nav">
            <button class="nav-btn" id="prev-btn-foot" onclick="navigatePost(-1)">← previous</button>
            <span class="nav-counter" id="nav-counter"></span>
            <button class="nav-btn" id="next-btn-foot" onclick="navigatePost(1)">next →</button>
        </div>
    </div>

    <script>
        let posts = [];
        let currentPostIndex = 0;

        function formatDate(date) {
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return `${months[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
        }

        async function loadPosts() {
            try {
                const response = await fetch('blog-posts.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                posts = data.sort((a, b) => new Date(b.date) - new Date(a.date));
                posts.forEach(post => { post.displayDate = formatDate(new Date(post.date)); });
            } catch (error) {
                console.error('Error loading blog posts:', error);
                posts = [{
                    id: 1,
                    date: new Date().toISOString(),
                    displayDate: formatDate(new Date()),
                    title: "Welcome to the Blog",
                    excerpt: "Blog posts will appear here once blog-posts.json is configured.",
                    content: "<p>Add your blog posts to blog-posts.json to see them here.</p>"
                }];
            }

            renderBlogCards();

            // Restore open post after refresh
            const savedPost = sessionStorage.getItem('blog_openPost');
            if (savedPost !== null) {
                openPost(parseInt(savedPost), true);
            }

            // Restore grid scroll if no post was open
            if (savedPost === null) {
                const y = sessionStorage.getItem('blog_scrollY');
                if (y) requestAnimationFrame(() => window.scrollTo(0, parseInt(y)));
            }
        }

        function renderBlogCards() {
            const grid = document.getElementById('blog-grid');
            grid.innerHTML = posts.map((post, index) => `
                <div class="blog-card" onclick="openPost(${index})">
                    <div class="blog-date">${post.displayDate}</div>
                    <h3 class="blog-card-title">${post.title}</h3>
                    <p class="blog-excerpt">${post.excerpt}</p>
                </div>
            `).join('');

            const n = posts.length;
            const label = `${n} ${n === 1 ? 'post' : 'posts'}`;
            document.getElementById('posts-count').textContent = label;
            document.getElementById('post-count-header').textContent = label;
        }

        function openPost(index, skipScrollRestore) {
            currentPostIndex = index;
            const post = posts[index];

            document.getElementById('modal-title').textContent = post.title;
            document.getElementById('modal-date').textContent = post.displayDate;
            document.getElementById('modal-body').innerHTML = post.content;
            document.getElementById('modal-eyebrow').textContent = `Post ${index + 1} of ${posts.length}`;

            const modal = document.getElementById('blog-modal');
            modal.classList.add('active');
            requestAnimationFrame(() => requestAnimationFrame(() => modal.classList.add('visible')));

            document.body.style.overflow = 'hidden';
            updateNavButtons();

            // Restore modal scroll or go to top
            const savedScroll = sessionStorage.getItem('blog_modalScrollY_' + index);
            if (!skipScrollRestore && savedScroll !== null) {
                requestAnimationFrame(() => { modal.scrollTop = parseInt(savedScroll); });
            } else {
                modal.scrollTop = 0;
            }

            sessionStorage.setItem('blog_openPost', index);

            modal.onscroll = () => {
                sessionStorage.setItem('blog_modalScrollY_' + currentPostIndex, modal.scrollTop);
            };
        }

        function closePost() {
            const modal = document.getElementById('blog-modal');
            modal.classList.remove('visible');
            setTimeout(() => {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }, 250);

            sessionStorage.removeItem('blog_openPost');

            const y = sessionStorage.getItem('blog_scrollY');
            if (y) requestAnimationFrame(() => window.scrollTo(0, parseInt(y)));
        }

        function navigatePost(direction) {
            const newIndex = currentPostIndex + direction;
            if (newIndex >= 0 && newIndex < posts.length) {
                openPost(newIndex, false);
            }
        }

        function updateNavButtons() {
            const atStart = currentPostIndex === 0;
            const atEnd   = currentPostIndex === posts.length - 1;
            const label   = `${currentPostIndex + 1} / ${posts.length}`;
            document.getElementById('prev-btn').disabled      = atStart;
            document.getElementById('next-btn').disabled      = atEnd;
            document.getElementById('prev-btn-foot').disabled = atStart;
            document.getElementById('next-btn-foot').disabled = atEnd;
            document.getElementById('nav-counter').textContent      = label;
            document.getElementById('modal-nav-label').textContent  = label;
        }

        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('blog-modal');
            if (modal.classList.contains('active')) {
                if (e.key === 'Escape')     closePost();
                if (e.key === 'ArrowLeft')  navigatePost(-1);
                if (e.key === 'ArrowRight') navigatePost(1);
            }
        });

        window.addEventListener('scroll', () => {
            document.getElementById('site-header').classList.toggle('scrolled', window.scrollY > 10);
            sessionStorage.setItem('blog_scrollY', window.scrollY);
        });

        loadPosts();
    </script>
</body>
</html>
